<div class="auth-container">
  <h2>Recuperar senha</h2>

  @if (!enviado()) {
    <p class="texto">
      Informe o e-mail cadastrado. Enviaremos um link para você redefinir sua senha.
    </p>

    <label for="email-recuperar" class="sr-only">E-mail</label>
    <input
      id="email-recuperar"
      type="email"
      inputmode="email"
      placeholder="E-mail"
      [ngModel]="email()"
      (ngModelChange)="email.set($event)"
      [disabled]="enviando()"
    >

    @if (erro()) {
      <p class="erro">{{ erro() }}</p>
    }

    <div class="actions">
      <button type="button" (click)="enviar()" [disabled]="enviando()">
        {{ enviando() ? 'Enviando...' : 'Enviar link' }}
      </button>
      <button
        type="button"
        class="btn-secondary"
        (click)="voltarParaLogin()"
        [disabled]="enviando()"
      >
        Voltar
      </button>
    </div>
  } @else {
    <p class="texto">
      Enviamos um link de redefinição de senha para <strong>{{ email() }}</strong>.
    </p>
    <p class="aviso-spam">⚠️ VERIFIQUE A CAIXA DE SPAM</p>

    <div class="actions">
      <button type="button" (click)="voltarParaLogin()">Ir para login</button>
    </div>
  }
</div>
