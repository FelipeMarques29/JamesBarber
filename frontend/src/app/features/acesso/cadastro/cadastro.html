<div class="auth-container">
  <div class="header">
    <i class="fas fa-user-plus"></i>
    <h2>Novo Membro</h2>
    <p>Junte-se à JamesBarber</p>
  </div>

  <div class="form-group">
    <label>Nome Completo</label>
    <input type="text" [(ngModel)]="novoCliente.cliente_nome" placeholder="Ex: Felipe Silva">
  </div>

  <div class="form-group">
    <label>E-mail</label>
    <input type="email" [(ngModel)]="novoCliente.cliente_email" placeholder="seu@email.com">
  </div>

  <div class="form-group">
    <label>Telefone</label>
    <input type="tel" [(ngModel)]="novoCliente.cliente_telefone" placeholder="(11) 99999-9999">
  </div>

  <div class="form-group">
    <label>Senha</label>
    <input type="password" [(ngModel)]="novoCliente.cliente_senha" placeholder="••••••••">
  </div>

  <div class="actions">
    <button (click)="cadastrar()" class="btn-primary">Finalizar Cadastro</button>
    <button (click)="voltarParaLogin()" class="btn-link">Já sou cliente? Entrar</button>
  </div>
</div>
