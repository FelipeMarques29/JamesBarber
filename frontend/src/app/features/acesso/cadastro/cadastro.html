<div class="auth-container">
  <div class="header">
    <i class="fas fa-user-plus"></i>
    <h2>Novo Membro</h2>
    <p>Junte-se à JamesBarber</p>
  </div>

  <div class="form-group">
    <label>Nome Completo</label>
    <input type="text" [(ngModel)]="novoCliente.nome" placeholder="Ex: Felipe Silva" />
  </div>

  <div class="form-group">
    <label>E-mail</label>
    <input type="email" [(ngModel)]="novoCliente.email" placeholder="seu@email.com" />
  </div>

  <div class="form-group">
    <label>Telefone</label>
    <input type="tel" [(ngModel)]="novoCliente.telefone" placeholder="(11) 99999-9999" />
  </div>

  <div class="form-group">
    <label>Senha</label>
    <input type="password" [(ngModel)]="senha" placeholder="••••••••" />
  </div>

  @if (erro()) {
  <p class="erro-senha">{{ erro() }}</p>
  }

  <div class="actions">
    <button (click)="cadastrar()" class="btn-primary" [disabled]="carregando()">
      {{ carregando() ? 'Cadastrando...' : 'Finalizar Cadastro' }}
    </button>
    <button (click)="voltarParaLogin()" class="btn-link" [disabled]="carregando()">
      Já sou cliente? Entrar
    </button>
  </div>
</div>
